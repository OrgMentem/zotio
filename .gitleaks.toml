# Extends gitleaks' bundled default ruleset; adds a scoped allowlist for the
# single synthetic secret that appears in a test fixture. This is a fake JWT
# used to exercise JWT-shape/parse logic, never a real credential.
[extend]
useDefault = true

# The synthetic JWT allowlist is scoped to the exact token. The old whole-file
# path exemption blinded the secrets gate to any real credential accidentally
# committed to any *_test.go file; this exempts only the known synthetic JWT
# header, so a real key in a test file is still flagged.
[[allowlists]]
description = "Synthetic JWT fixture in jwtshape_test.go (JWT-shape detection, not a credential)"
regexTarget = "line"
regexes = [
  '''eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6ImFvNi1PYzAyQlZHTF9GbnBDeE5JMiJ9''',
]

# Better BibTeX citation keys in the demo fixture
# (internal/cli/testdata/demo_library.json) look like `Citation Key:
# hochreiter1997lstm` and trip generic-api-key. A citation-key declaration
# line is bibliographic metadata, not a credential; scoped to the exact
# line shape so real keys elsewhere on other line shapes are still flagged.
[[allowlists]]
description = "Better BibTeX 'Citation Key:' lines in bibliographic fixtures"
regexTarget = "line"
regexes = [
  '''Citation Key: [A-Za-z][A-Za-z0-9:._-]*''',
]
