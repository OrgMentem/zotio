<?xml version="1.0" encoding="UTF-8"?>
<svg class="zotio-diagram" xmlns="http://www.w3.org/2000/svg" width="960" height="650" viewBox="0 0 960 650" role="img" aria-labelledby="zd2-title zd2-desc">
  <title id="zd2-title">Reviewable import flow for zotio</title>
  <desc id="zd2-desc">A three stage pipeline for zotio import scan, resolve, and apply over an editable manifest, with review before writes and preview by default.</desc>
  <defs>
    <filter id="zd2-softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#1e2a44" flood-opacity="0.12"/>
    </filter>
    <marker id="zd2-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-text)"/>
    </marker>
    <style>
      .zotio-diagram {
        --canvas: #fbfcfe;
        --surface: #ffffff;
        --border: #d7dee9;
        --border-dim: #cbd5e1;
        --text-strong: #1e2a44;
        --text-body: #33415c;
        --grey: #64748b;
        --read-bg: #e6f0fb;
        --read-line: #2c6cb0;
        --read-text: #173a5e;
        --write-bg: #fde2e2;
        --write-line: #c0392b;
        --write-text: #7a1f16;
        --ext-bg: #fdf3d8;
        --ext-line: #b8860b;
        --ext-text: #6b4e0a;
        --local-bg: #eef1f5;
        --replay: #0aa06e;
        --core: #4f46e5;
        --core-stroke: #312e81;
        --accent-text: #4f46e5;
        --banner-mark: #94a3b8;
        --border-2: #e2e8f0;
        --border-3: #d8e0ec;
        --border-4: #d8dee8;
        --green-bg: #d6f5e3;
        --green-bg-soft: #eefaf3;
        --green-text: #0a5f43;
        --indigo-text: #4338ca;
        --indigo-bg-line: #c7d2fe;
        --indigo-bg: #f2f4ff;
        --amber-text2: #8c6d1e;
      }
      @media (prefers-color-scheme: dark) {
        .zotio-diagram {
          --canvas: #12161f;
          --surface: #1b2230;
          --border: #2c3647;
          --border-dim: #3a4660;
          --text-strong: #eaeef6;
          --text-body: #c6cfdd;
          --grey: #8b98ac;
          --read-bg: #14273c;
          --read-line: #5b9bd5;
          --read-text: #cfe2f6;
          --write-bg: #3a1c1a;
          --write-line: #e07a6e;
          --write-text: #f6cec9;
          --ext-bg: #322b12;
          --ext-line: #d9ab35;
          --ext-text: #f0e0ad;
          --local-bg: #1d2431;
          --replay: #2ecb93;
          --core: #6366f1;
          --core-stroke: #4f46e5;
          --accent-text: #a5b4fc;
          --banner-mark: #8b98ac;
          --border-2: #2c3647;
          --border-3: #2c3647;
          --border-4: #2c3647;
          --green-bg: #16321f;
          --green-bg-soft: #14251b;
          --green-text: #a7e8c8;
          --indigo-text: #a5b4fc;
          --indigo-bg-line: #3a3f6e;
          --indigo-bg: #1c2030;
          --amber-text2: #e6c877;
        }
      }
.zotio-diagram .font { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }.zotio-diagram .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }.zotio-diagram .title { font-size: 21px; font-weight: 700; fill: var(--text-strong); }.zotio-diagram .subtitle { font-size: 13px; fill: var(--grey); }.zotio-diagram .stage-title { font-size: 14px; font-weight: 700; letter-spacing: 0.8px; }.zotio-diagram .label { font-size: 13px; fill: var(--text-body); }.zotio-diagram .small { font-size: 12px; fill: var(--grey); }.zotio-diagram .tiny { font-size: 11px; fill: var(--grey); }.zotio-diagram .chip { font-size: 11px; font-weight: 700; }.zotio-diagram .arrow { stroke: var(--accent-text); stroke-width: 2.4; fill: none; marker-end: url(#zd2-arrow); stroke-linecap: round; }.zotio-diagram .line { stroke: var(--banner-mark); stroke-width: 1.5; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="650" fill="var(--canvas)"/>

  <g class="font">
    <text x="32" y="40" class="title">Reviewable import: references without making a mess</text>
    <text x="32" y="63" class="subtitle">Nothing hits your library until you review the manifest; writes preview by default.</text>

    <g transform="translate(664 29)">
      <rect x="0" y="0" width="252" height="42" rx="10" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.5"/>
      <rect x="14" y="14" width="14" height="14" rx="3" fill="var(--read-bg)" stroke="var(--read-line)" stroke-width="1.5"/>
      <text x="34" y="25" class="tiny">read-only</text>
      <rect x="95" y="14" width="14" height="14" rx="3" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="1.5"/>
      <text x="115" y="25" class="tiny">external</text>
      <rect x="177" y="14" width="14" height="14" rx="3" fill="var(--write-bg)" stroke="var(--write-line)" stroke-width="1.5"/>
      <text x="197" y="25" class="tiny">write</text>
    </g>

    <rect x="32" y="96" width="896" height="392" rx="18" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.5" filter="url(#zd2-softShadow)"/>
    <text x="64" y="123" class="small" font-weight="700">Three-stage pipeline over an editable manifest</text>

    <path class="arrow" d="M 310 250 H 350"/>
    <path class="arrow" d="M 610 250 H 650"/>

    <!-- Stage 1: scan -->
    <g transform="translate(58 142)">
      <rect x="0" y="0" width="252" height="244" rx="14" fill="var(--read-bg)" stroke="var(--read-line)" stroke-width="2"/>
      <text x="18" y="28" class="stage-title" fill="var(--read-text)">1 · SCAN</text>
      <text x="18" y="49" class="mono small">zotio import scan</text>
      <rect x="146" y="12" width="92" height="22" rx="11" fill="var(--surface)" stroke="var(--read-line)" stroke-width="1.4"/>
      <text x="192" y="27" text-anchor="middle" class="chip" fill="var(--read-text)">READ-ONLY</text>

      <g transform="translate(24 74)">
        <path d="M 6 14 H 76 Q 84 14 84 22 V 71 Q 84 79 76 79 H 8 Q 0 79 0 71 V 12 Q 0 4 8 4 H 31 L 39 14 Z" fill="var(--surface)" stroke="var(--read-line)" stroke-width="1.8"/>
        <rect x="14" y="28" width="18" height="24" rx="2" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="1.2"/>
        <rect x="38" y="28" width="18" height="24" rx="2" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="1.2"/>
        <rect x="26" y="43" width="18" height="24" rx="2" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="1.2"/>
        <text x="99" y="31" class="label" fill="var(--read-text)" font-weight="700">folder of PDFs</text>
        <text x="99" y="51" class="small">triage without writes</text>
      </g>

      <text x="18" y="172" class="small" fill="var(--read-text)" font-weight="700">Buckets found</text>
      <rect x="18" y="183" width="56" height="25" rx="12" fill="var(--green-bg)" stroke="var(--replay)" stroke-width="1.5"/>
      <text x="32" y="200" class="chip" fill="var(--green-text)">NEW</text>
      <rect x="82" y="183" width="91" height="25" rx="12" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="1.5"/>
      <text x="97" y="200" class="chip" fill="var(--text-body)">DUPLICATE</text>
      <rect x="61" y="212" width="139" height="25" rx="12" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="1.5"/>
      <text x="74" y="229" class="chip" fill="var(--ext-text)">ATTACH-CANDIDATE</text>
    </g>

    <!-- Stage 2: resolve -->
    <g transform="translate(354 142)">
      <rect x="0" y="0" width="252" height="244" rx="14" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="2"/>
      <text x="18" y="28" class="stage-title" fill="var(--ext-text)">2 · RESOLVE</text>
      <text x="18" y="49" class="mono small">zotio import resolve</text>
      <text x="18" y="76" class="small" fill="var(--ext-text)" font-weight="700">Identifiers</text>
      <text x="18" y="96" class="tiny">DOI · PMID · arXiv · ISBN · URL</text>

      <g transform="translate(18 112)">
        <rect x="0" y="0" width="76" height="24" rx="12" fill="var(--surface)" stroke="var(--ext-line)" stroke-width="1.3"/>
        <text x="17" y="16" class="tiny" fill="var(--ext-text)" font-weight="700">CrossRef</text>
        <rect x="84" y="0" width="74" height="24" rx="12" fill="var(--surface)" stroke="var(--ext-line)" stroke-width="1.3"/>
        <text x="104" y="16" class="tiny" fill="var(--ext-text)" font-weight="700">PubMed</text>
        <rect x="166" y="0" width="54" height="24" rx="12" fill="var(--surface)" stroke="var(--ext-line)" stroke-width="1.3"/>
        <text x="180" y="16" class="tiny" fill="var(--ext-text)" font-weight="700">arXiv</text>
        <rect x="42" y="32" width="118" height="24" rx="12" fill="var(--surface)" stroke="var(--ext-line)" stroke-width="1.3"/>
        <text x="60" y="48" class="tiny" fill="var(--ext-text)" font-weight="700">Open Library</text>
      </g>

      <g transform="translate(18 178)">
        <rect x="0" y="0" width="98" height="46" rx="8" fill="var(--surface)" stroke="var(--ext-line)" stroke-width="1.8"/>
        <path d="M 80 0 V 18 H 98" fill="none" stroke="var(--ext-line)" stroke-width="1.5"/>
        <path d="M 80 0 L 98 18" fill="none" stroke="var(--ext-line)" stroke-width="1.5"/>
        <text x="12" y="20" class="mono tiny" fill="var(--ext-text)">manifest</text>
        <text x="12" y="38" class="mono tiny" fill="var(--grey)">import.json</text>
        <path d="M 104 23 H 122" class="line"/>
        <circle cx="140" cy="11" r="8" fill="var(--green-bg)" stroke="var(--replay)" stroke-width="1.5"/>
        <path d="M 140 20 V 37" stroke="var(--replay)" stroke-width="2" stroke-linecap="round"/>
        <path d="M 128 28 H 152" stroke="var(--replay)" stroke-width="2" stroke-linecap="round"/>
        <path d="M 140 37 L 131 46 M 140 37 L 149 46" stroke="var(--replay)" stroke-width="2" stroke-linecap="round"/>
        <text x="162" y="20" class="chip" fill="var(--green-text)">you review</text>
        <text x="162" y="35" class="chip" fill="var(--green-text)">&amp; edit</text>
      </g>
    </g>

    <!-- Stage 3: apply -->
    <g transform="translate(650 142)">
      <rect x="0" y="0" width="252" height="244" rx="14" fill="var(--write-bg)" stroke="var(--write-line)" stroke-width="2"/>
      <text x="18" y="28" class="stage-title" fill="var(--write-text)">3 · APPLY</text>
      <text x="18" y="49" class="mono small">zotio import apply</text>
      <rect x="122" y="12" width="120" height="22" rx="11" fill="var(--surface)" stroke="var(--write-line)" stroke-width="1.4"/>
      <text x="182" y="27" text-anchor="middle" class="chip" fill="var(--write-text)">PREVIEW-FIRST</text>

      <g transform="translate(18 73)">
        <rect x="0" y="0" width="91" height="58" rx="9" fill="var(--surface)" stroke="var(--write-line)" stroke-width="1.6"/>
        <text x="15" y="23" class="label" fill="var(--write-text)" font-weight="700">plan</text>
        <text x="15" y="42" class="tiny">preview</text>
        <path d="M 101 29 H 130" class="arrow"/>
        <rect x="138" y="11" width="58" height="36" rx="10" fill="var(--surface)" stroke="var(--write-line)" stroke-width="1.6"/>
        <text x="151" y="33" class="mono tiny" fill="var(--write-text)" font-weight="700">--yes</text>
      </g>

      <g transform="translate(18 149)">
        <rect x="0" y="0" width="216" height="72" rx="10" fill="var(--surface)" stroke="var(--write-line)" stroke-width="1.5"/>
        <text x="15" y="22" class="label" fill="var(--write-text)" font-weight="700">schema-valid item creation</text>
        <text x="15" y="42" class="mono tiny">--attach-mode</text>
        <text x="15" y="56" class="mono tiny">none|linked-file</text>
        <text x="15" y="68" class="tiny">Zotero Web API · upload deferred</text>
      </g>
    </g>

    <!-- Editable manifest rail -->
    <g transform="translate(78 401)">
      <rect x="0" y="0" width="804" height="62" rx="16" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="1.7"/>
      <text x="26" y="27" class="stage-title" fill="var(--text-body)">EDITABLE MANIFEST</text>
      <text x="26" y="47" class="small">The manifest is the handoff: scan findings + resolved metadata + your edits.</text>
      <rect x="604" y="13" width="174" height="36" rx="18" fill="none" stroke="var(--replay)" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.55"/>
      <text x="691" y="36" text-anchor="middle" class="chip" fill="var(--green-text)">▸ no writes until apply</text>
    </g>

    <!-- One-shot importers -->
    <g transform="translate(64 527)">
      <text x="0" y="0" class="small" fill="var(--text-body)" font-weight="700">Individual one-shot importers</text>
      <rect x="0" y="16" width="832" height="71" rx="16" fill="var(--surface)" stroke="var(--border-2)" stroke-width="1.5"/>
      <g class="mono">
        <rect x="28" y="38" width="92" height="26" rx="13" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="1.4"/>
        <text x="43" y="55" class="tiny">import doi</text>
        <rect x="132" y="38" width="100" height="26" rx="13" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="1.4"/>
        <text x="145" y="55" class="tiny">import pmid</text>
        <rect x="244" y="38" width="104" height="26" rx="13" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="1.4"/>
        <text x="257" y="55" class="tiny">import arxiv</text>
        <rect x="360" y="38" width="100" height="26" rx="13" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="1.4"/>
        <text x="373" y="55" class="tiny">import isbn</text>
        <rect x="472" y="38" width="92" height="26" rx="13" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="1.4"/>
        <text x="487" y="55" class="tiny">import url</text>
        <rect x="576" y="38" width="100" height="26" rx="13" fill="var(--read-bg)" stroke="var(--read-line)" stroke-width="1.4"/>
        <text x="591" y="55" class="tiny">import file</text>
        <rect x="688" y="38" width="92" height="26" rx="13" fill="var(--read-bg)" stroke="var(--read-line)" stroke-width="1.4"/>
        <text x="704" y="55" class="tiny">import pdf</text>
      </g>
    </g>
  </g>
</svg>
