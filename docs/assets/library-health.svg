<svg class="zotio-diagram" xmlns="http://www.w3.org/2000/svg" width="960" height="660" viewBox="0 0 960 660" role="img" aria-labelledby="zd3-title zd3-desc">
  <title id="zd3-title">zotio library health diagnostic and CI gate</title>
  <desc id="zd3-desc">Left-to-right flow showing scope selection, preset composition, existing read-only checks, one ranked stable-keyed report, and CI gate exits for pass, quality failure, or freshness failure.</desc>
  <defs>
    <filter id="zd3-softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1e2a44" flood-opacity="0.12"/>
    </filter>
    <marker id="zd3-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-text)"/>
    </marker>
    <style>
      .zotio-diagram {
        --canvas: #fbfcfe;
        --surface: #ffffff;
        --border: #d7dee9;
        --border-dim: #cbd5e1;
        --text-strong: #1e2a44;
        --text-body: #33415c;
        --grey: #64748b;
        --read-bg: #e6f0fb;
        --read-line: #2c6cb0;
        --read-text: #173a5e;
        --write-bg: #fde2e2;
        --write-line: #c0392b;
        --write-text: #7a1f16;
        --ext-bg: #fdf3d8;
        --ext-line: #b8860b;
        --ext-text: #6b4e0a;
        --local-bg: #eef1f5;
        --replay: #0aa06e;
        --core: #4f46e5;
        --core-stroke: #312e81;
        --accent-text: #4f46e5;
        --banner-mark: #94a3b8;
        --border-2: #e2e8f0;
        --border-3: #d8e0ec;
        --border-4: #d8dee8;
        --green-bg: #d6f5e3;
        --green-bg-soft: #eefaf3;
        --green-text: #0a5f43;
        --indigo-text: #4338ca;
        --indigo-bg-line: #c7d2fe;
        --indigo-bg: #f2f4ff;
        --amber-text2: #8c6d1e;
      }
      @media (prefers-color-scheme: dark) {
        .zotio-diagram {
          --canvas: #12161f;
          --surface: #1b2230;
          --border: #2c3647;
          --border-dim: #3a4660;
          --text-strong: #eaeef6;
          --text-body: #c6cfdd;
          --grey: #8b98ac;
          --read-bg: #14273c;
          --read-line: #5b9bd5;
          --read-text: #cfe2f6;
          --write-bg: #3a1c1a;
          --write-line: #e07a6e;
          --write-text: #f6cec9;
          --ext-bg: #322b12;
          --ext-line: #d9ab35;
          --ext-text: #f0e0ad;
          --local-bg: #1d2431;
          --replay: #2ecb93;
          --core: #6366f1;
          --core-stroke: #4f46e5;
          --accent-text: #a5b4fc;
          --banner-mark: #8b98ac;
          --border-2: #2c3647;
          --border-3: #2c3647;
          --border-4: #2c3647;
          --green-bg: #16321f;
          --green-bg-soft: #14251b;
          --green-text: #a7e8c8;
          --indigo-text: #a5b4fc;
          --indigo-bg-line: #3a3f6e;
          --indigo-bg: #1c2030;
          --amber-text2: #e6c877;
        }
      }
.zotio-diagram .canvas { fill: var(--canvas); }.zotio-diagram .title { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: var(--text-strong); }.zotio-diagram .subtitle { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 13px; fill: var(--grey); }.zotio-diagram .card-title { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: var(--text-strong); }.zotio-diagram .node-title { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; }.zotio-diagram .body { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 12px; fill: var(--text-body); }.zotio-diagram .muted { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 11.5px; fill: var(--grey); }.zotio-diagram .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11.5px; fill: var(--text-body); }.zotio-diagram .mono-small { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10.5px; fill: var(--grey); }.zotio-diagram .legend { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-size: 11px; fill: var(--grey); }.zotio-diagram .panel { fill: var(--surface); stroke: var(--border-3); stroke-width: 1.6; filter: url(#zd3-softShadow); }.zotio-diagram .read { fill: var(--read-bg); stroke: var(--read-line); stroke-width: 1.7; }.zotio-diagram .read-text { fill: var(--read-text); }.zotio-diagram .desktop { fill: var(--local-bg); stroke: var(--grey); stroke-width: 1.6; }.zotio-diagram .desktop-text { fill: var(--text-body); }.zotio-diagram .green { fill: var(--green-bg); stroke: var(--replay); stroke-width: 1.7; }.zotio-diagram .green-text { fill: var(--green-text); }.zotio-diagram .coral { fill: var(--write-bg); stroke: var(--write-line); stroke-width: 1.7; }.zotio-diagram .coral-text { fill: var(--write-text); }.zotio-diagram .amber { fill: var(--ext-bg); stroke: var(--ext-line); stroke-width: 1.7; }.zotio-diagram .amber-text { fill: var(--ext-text); }.zotio-diagram .connector { fill: none; stroke: var(--accent-text); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#zd3-arrow); }.zotio-diagram .thin { fill: none; stroke: var(--banner-mark); stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }.zotio-diagram .label-bg { fill: var(--canvas); stroke: var(--border-3); stroke-width: 1; }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="960" height="660"/>

  <text class="title" x="28" y="34">library health: diagnostic report → CI gate</text>
  <text class="subtitle" x="28" y="56">Read-only primitives are composed into one stable-keyed report, then gated by quality and freshness.</text>

  <g aria-label="legend">
    <rect x="692" y="22" width="14" height="14" rx="3" class="read"/>
    <text x="712" y="33" class="legend">read/local check</text>
    <rect x="805" y="22" width="14" height="14" rx="3" class="desktop"/>
    <text x="825" y="33" class="legend">live desktop</text>
    <rect x="692" y="43" width="14" height="14" rx="3" class="green"/>
    <text x="712" y="54" class="legend">pass</text>
    <rect x="805" y="43" width="14" height="14" rx="3" class="coral"/>
    <text x="825" y="54" class="legend">quality fail</text>
  </g>

  <!-- 1. Scope -->
  <g aria-label="scope inputs">
    <rect x="28" y="112" width="165" height="232" rx="12" class="panel"/>
    <text x="48" y="138" class="card-title">1  SCOPE</text>
    <text x="48" y="158" class="muted">one selection grammar</text>

    <rect x="48" y="176" width="115" height="25" rx="12" class="desktop"/>
    <text x="60" y="193" class="mono">whole library</text>

    <rect x="48" y="209" width="126" height="25" rx="12" class="desktop"/>
    <text x="60" y="226" class="mono">collection:KEY</text>

    <rect x="48" y="242" width="95" height="25" rx="12" class="desktop"/>
    <text x="60" y="259" class="mono">tag:NAME</text>

    <rect x="48" y="275" width="104" height="25" rx="12" class="desktop"/>
    <text x="60" y="292" class="mono">query:TEXT</text>

    <rect x="48" y="307" width="132" height="25" rx="12" class="desktop"/>
    <text x="58" y="324" class="mono">saved-search:KEY</text>
  </g>

  <!-- 2. Preset selector -->
  <g aria-label="for preset selector">
    <rect x="225" y="105" width="220" height="285" rx="12" class="panel"/>
    <text x="247" y="131" class="card-title">2  <tspan class="mono">--for</tspan> preset</text>
    <text x="247" y="151" class="muted">declares downstream intent</text>

    <rect x="247" y="166" width="176" height="40" rx="10" class="read"/>
    <text x="260" y="184" class="node-title read-text">quick</text>
    <text x="260" y="199" class="muted">anything broken</text>

    <rect x="247" y="214" width="176" height="56" rx="10" class="read"/>
    <text x="260" y="232" class="node-title read-text">citation</text>
    <text x="260" y="247" class="muted">citekeys, core fields,</text>
    <text x="260" y="261" class="muted">duplicates</text>

    <rect x="247" y="278" width="176" height="56" rx="10" class="read"/>
    <text x="260" y="296" class="node-title read-text">systematic-review</text>
    <text x="260" y="311" class="muted">duplicates, screenable</text>
    <text x="260" y="325" class="muted">metadata, full-text PDFs</text>

    <rect x="247" y="342" width="176" height="34" rx="10" class="read"/>
    <text x="260" y="362" class="node-title read-text">all</text>
    <text x="300" y="362" class="muted">all checks</text>
  </g>

  <!-- 3. Composed checks -->
  <g aria-label="composed checks">
    <rect x="475" y="105" width="195" height="267" rx="12" class="read" filter="url(#zd3-softShadow)"/>
    <text x="494" y="131" class="card-title read-text">3  COMPOSED CHECKS</text>
    <text x="494" y="151" class="muted">existing primitives only</text>

    <rect x="494" y="170" width="155" height="25" rx="8" fill="var(--surface)" stroke="var(--read-line)" stroke-width="1.2"/>
    <text x="506" y="187" class="mono-small">citekey conflicts</text>

    <rect x="494" y="202" width="126" height="25" rx="8" fill="var(--surface)" stroke="var(--read-line)" stroke-width="1.2"/>
    <text x="506" y="219" class="mono-small">duplicates</text>

    <rect x="494" y="234" width="155" height="25" rx="8" fill="var(--surface)" stroke="var(--read-line)" stroke-width="1.2"/>
    <text x="506" y="251" class="mono-small">missing DOI/abstract</text>

    <rect x="494" y="266" width="105" height="25" rx="8" fill="var(--surface)" stroke="var(--read-line)" stroke-width="1.2"/>
    <text x="506" y="283" class="mono-small">missing PDF</text>

    <rect x="494" y="298" width="92" height="25" rx="8" fill="var(--surface)" stroke="var(--read-line)" stroke-width="1.2"/>
    <text x="506" y="315" class="mono-small">tag drift</text>

    <rect x="494" y="330" width="155" height="28" rx="8" class="desktop"/>
    <text x="505" y="348" class="mono-small desktop-text">missing file</text>
    <rect x="614" y="333" width="30" height="18" rx="9" fill="var(--canvas)" stroke="var(--grey)" stroke-width="1"/>
    <text x="629" y="346" text-anchor="middle" class="legend">LIVE</text>
  </g>

  <!-- 4. Report output -->
  <g aria-label="ranked report output">
    <rect x="705" y="112" width="225" height="143" rx="12" class="panel"/>
    <text x="727" y="138" class="card-title">4  OUTPUT</text>
    <rect x="727" y="157" width="190" height="30" rx="10" class="read"/>
    <text x="739" y="177" class="body read-text" font-weight="700">ranked finding-typed report</text>

    <text x="727" y="207" class="body">• severity-ranked findings</text>
    <text x="727" y="225" class="body">• typed by check/source</text>
    <text x="727" y="243" class="body">• one report, not fragments</text>

    <rect x="705" y="260" width="225" height="26" rx="8" fill="var(--indigo-bg)" stroke="var(--indigo-bg-line)" stroke-width="1"/>
    <text x="717" y="277" class="mono-small" fill="var(--indigo-text)">stable finding keys • CI diffable</text>
  </g>

  <!-- Skipped live check note -->
  <g aria-label="skipped live check note">
    <text x="494" y="416" class="mono-small" fill="var(--ext-text)"><tspan fill="var(--banner-mark)">▸ </tspan>missing-file check · skipped</text>
    <text x="494" y="434" class="muted" fill="var(--amber-text2)">needs Zotero desktop · still reported</text>
  </g>

  <!-- CI gate and outcomes -->
  <g aria-label="freshness branch">
    <rect x="826" y="306" width="104" height="50" rx="10" class="amber"/>
    <text x="878" y="326" text-anchor="middle" class="node-title amber-text">exit 12</text>
    <text x="878" y="344" text-anchor="middle" class="mono-small" fill="var(--ext-text)">stale mirror</text>
  </g>

  <g aria-label="ci gate">
    <polygon points="815,348 900,420 815,492 730,420" fill="var(--surface)" stroke="var(--accent-text)" stroke-width="2" filter="url(#zd3-softShadow)"/>
    <text x="815" y="397" text-anchor="middle" class="card-title">CI GATE</text>
    <text x="815" y="417" text-anchor="middle" class="mono">--fail-on high</text>
    <text x="815" y="437" text-anchor="middle" class="muted">finding ≥ high?</text>
  </g>

  <g aria-label="gate outcomes">
    <rect x="688" y="535" width="108" height="56" rx="12" class="green" filter="url(#zd3-softShadow)"/>
    <text x="742" y="558" text-anchor="middle" class="node-title green-text">exit 0</text>
    <text x="742" y="577" text-anchor="middle" class="body green-text">pass</text>

    <rect x="821" y="535" width="112" height="56" rx="12" class="coral" filter="url(#zd3-softShadow)"/>
    <text x="877" y="558" text-anchor="middle" class="node-title coral-text">exit 11</text>
    <text x="877" y="577" text-anchor="middle" class="body coral-text">quality fail</text>
  </g>

  <!-- connectors -->
  <path class="connector" d="M193 207 L221 207"/>
  <path class="connector" d="M445 207 L471 207"/>
  <path class="connector" d="M670 207 C684 207 688 185 701 185"/>
  <path class="connector" d="M810 294 C810 322 812 338 815 348"/>
  <path class="connector" d="M810 294 C816 302 820 314 826 322"/>
  <path class="thin" d="M600 358 C600 378 560 380 545 392"/>
  <path class="connector" d="M770 458 C750 480 742 504 742 531"/>
  <path class="connector" d="M860 458 C877 482 877 505 877 531"/>

  <!-- connector labels -->
  <g aria-label="connector labels">
    <rect x="824" y="500" width="29" height="17" rx="5" class="label-bg"/>
    <text x="839" y="512" text-anchor="middle" class="legend">yes</text>

    <rect x="736" y="500" width="25" height="17" rx="5" class="label-bg"/>
    <text x="749" y="512" text-anchor="middle" class="legend">no</text>

    <rect x="672" y="300" width="132" height="20" rx="5" class="label-bg"/>
    <text x="738" y="314" text-anchor="middle" class="mono-small">--require-fresh 24h</text>
  </g>

  <!-- bottom thesis -->
  <g aria-label="composition thesis">
    <line x1="28" y1="556" x2="632" y2="556" stroke="var(--border-dim)" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="28" y="582" class="card-title"><tspan fill="var(--banner-mark)">▸ </tspan>Flagship behavior</text>
    <text x="28" y="602" class="body">Composes citekeys, duplicates, metadata gaps, tag drift, and live attachment checks into one CI-friendly report.</text>
  </g>
</svg>
