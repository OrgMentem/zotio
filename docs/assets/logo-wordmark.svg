<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 660">
  <title>zotio</title>
  <desc>Animated zotio wordmark: the indigo ring draws on, the z snaps into place, the wordmark rises, and the gold i-dot rolls along the ring rim, wakes up, realises it is off its mark, leaps into the break with a squash landing, blinks, and winks before settling into the static mark.</desc>
  <style>
    :root {
      --mark: #1E2A44;
      --brand: #4F46E5;
      --gold: #E6C877;
      --cycle: 10s;
      --ease-out: cubic-bezier(.22, 1, .36, 1);
    }

    .logo-ring {
      stroke: var(--brand);
      stroke-dasharray: 1150;
      animation: ring-build var(--cycle) var(--ease-out) infinite;
    }

    .logo-z {
      fill: var(--brand);
      transform-box: fill-box;
      transform-origin: center;
      animation: z-build var(--cycle) var(--ease-out) infinite;
    }

    .logo-wordmark {
      fill: var(--mark);
      animation: wordmark-build var(--cycle) var(--ease-out) infinite;
    }

    .dot-orbit {
      transform-origin: 256px 256px;
      animation: dot-roll var(--cycle) var(--ease-out) infinite;
    }

    .dot-radial {
      animation: dot-hop var(--cycle) ease-in-out infinite;
    }

    .dot-squash {
      transform-box: fill-box;
      transform-origin: center;
      animation: dot-land var(--cycle) ease-in-out infinite;
    }

    .logo-dot {
      fill: var(--gold);
    }

    .dot-face {
      opacity: 0;
      animation: face-fade var(--cycle) ease-in-out infinite;
    }

    .eye-l-open {
      animation: eye-l-open var(--cycle) steps(1, end) infinite;
    }

    .eye-r-open {
      animation: eye-r-open var(--cycle) steps(1, end) infinite;
    }

    .eye-l-shut {
      opacity: 0;
      animation: eye-l-shut var(--cycle) steps(1, end) infinite;
    }

    .eye-r-shut {
      opacity: 0;
      animation: eye-r-shut var(--cycle) steps(1, end) infinite;
    }

    .eye-gaze {
      animation: eye-gaze var(--cycle) ease-in-out infinite;
    }

    .mouth-smile {
      animation: mouth-smile var(--cycle) steps(1, end) infinite;
    }

    .mouth-oh {
      opacity: 0;
      animation: mouth-oh var(--cycle) steps(1, end) infinite;
    }

    @keyframes ring-build {
      0% { opacity: 0; stroke-dashoffset: 1150; }
      2% { opacity: 1; stroke-dashoffset: 1150; }
      12%, 100% { opacity: 1; stroke-dashoffset: 0; }
    }

    @keyframes z-build {
      0%, 9% { opacity: 0; transform: scale(.72); }
      18%, 100% { opacity: 1; transform: none; }
    }

    @keyframes wordmark-build {
      0%, 18% { opacity: 0; transform: translateY(18px); }
      27%, 100% { opacity: 1; transform: none; }
    }

    @keyframes dot-roll {
      0%, 13% { opacity: 0; transform: rotate(-300deg); }
      14% { opacity: 1; transform: rotate(-300deg); }
      27%, 100% { opacity: 1; transform: rotate(0deg); }
    }

    @keyframes dot-hop {
      0%, 29% { transform: translate(19px, -19px); }
      31% { transform: translate(27px, -27px); }
      33% { transform: translate(6px, -30px); }
      34.5% { transform: translate(-3px, 3px); }
      37%, 100% { transform: none; }
    }

    @keyframes dot-land {
      0%, 31% { transform: none; }
      33% { transform: scale(.9, 1.12); }
      35% { transform: scale(1.16, .84); }
      38%, 100% { transform: none; }
    }

    @keyframes face-fade {
      0%, 26.5% { opacity: 0; }
      28%, 50% { opacity: 1; }
      53%, 100% { opacity: 0; }
    }

    @keyframes eye-l-open {
      0%, 39.4% { opacity: 1; }
      39.5%, 40.6% { opacity: 0; }
      40.7%, 45.4% { opacity: 1; }
      45.5%, 47.1% { opacity: 0; }
      47.2%, 100% { opacity: 1; }
    }

    @keyframes eye-l-shut {
      0%, 39.4% { opacity: 0; }
      39.5%, 40.6% { opacity: 1; }
      40.7%, 45.4% { opacity: 0; }
      45.5%, 47.1% { opacity: 1; }
      47.2%, 100% { opacity: 0; }
    }

    @keyframes eye-r-open {
      0%, 39.4% { opacity: 1; }
      39.5%, 40.6% { opacity: 0; }
      40.7%, 100% { opacity: 1; }
    }

    @keyframes eye-r-shut {
      0%, 39.4% { opacity: 0; }
      39.5%, 40.6% { opacity: 1; }
      40.7%, 100% { opacity: 0; }
    }

    @keyframes eye-gaze {
      0%, 29% { transform: none; }
      30.5%, 34.5% { transform: translate(-2.5px, 2.5px); }
      36.5%, 100% { transform: none; }
    }

    @keyframes mouth-smile {
      0%, 29.4% { opacity: 1; }
      29.5%, 35.9% { opacity: 0; }
      36%, 100% { opacity: 1; }
    }

    @keyframes mouth-oh {
      0%, 29.4% { opacity: 0; }
      29.5%, 35.9% { opacity: 1; }
      36%, 100% { opacity: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-ring,
      .logo-z,
      .logo-wordmark,
      .dot-orbit,
      .dot-radial,
      .dot-squash,
      .dot-face,
      .eye-l-open,
      .eye-r-open,
      .eye-l-shut,
      .eye-r-shut,
      .eye-gaze,
      .mouth-smile,
      .mouth-oh {
        animation: none !important;
      }

      .logo-ring {
        opacity: 1;
        stroke-dashoffset: 0;
      }

      .logo-z,
      .logo-wordmark,
      .dot-orbit {
        opacity: 1;
        transform: none;
      }

      .dot-radial,
      .dot-squash {
        transform: none;
      }

      .dot-face,
      .eye-l-shut,
      .eye-r-shut,
      .mouth-oh { opacity: 0; }

      .eye-l-open,
      .eye-r-open,
      .mouth-smile { opacity: 1; }

      .eye-gaze { transform: none; }
    }
  </style>

  <g transform="translate(56.5 0) scale(0.78)">
    <path class="logo-ring" d="M342.2 71.1 A204 204 0 1 0 440.9 169.8" fill="none" stroke-width="46" stroke-linecap="round"/>
    <path class="logo-z" d="M148 156 H364 V210 L240 302 H364 V356 H148 V302 L272 210 H148 Z"/>
    <g class="dot-orbit">
      <g class="dot-radial">
        <g class="dot-squash">
          <circle class="logo-dot" cx="400.2" cy="111.8" r="27"/>
          <g class="dot-face" aria-hidden="true">
            <g class="eye-gaze" fill="#1E2A44">
              <circle class="eye-l-open" cx="392.5" cy="106.5" r="4.5"/>
              <circle class="eye-r-open" cx="408" cy="106.5" r="4.5"/>
            </g>
            <g fill="none" stroke="#1E2A44" stroke-width="3.5" stroke-linecap="round">
              <path class="eye-l-shut" d="M 388.5 106.5 h 8"/>
              <path class="eye-r-shut" d="M 404 106.5 h 8"/>
            </g>
            <path class="mouth-smile" d="M 393 120 Q 400.2 125.5 407.5 120" fill="none" stroke="#1E2A44" stroke-width="3" stroke-linecap="round"/>
            <circle class="mouth-oh" cx="400.2" cy="121" r="3.4" fill="#1E2A44"/>
          </g>
        </g>
      </g>
    </g>
  </g>
  <text class="logo-wordmark" x="256" y="600" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="150" font-weight="600" letter-spacing="2">zotio</text>
</svg>
