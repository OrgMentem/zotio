<?xml version="1.0" encoding="UTF-8"?>
<svg class="zotio-diagram" xmlns="http://www.w3.org/2000/svg" width="960" height="680" viewBox="0 0 960 680" role="img" aria-labelledby="zd5-title zd5-desc">
  <title id="zd5-title">zotio write-safety lifecycle</title>
  <desc id="zd5-desc">Preview-first write command lifecycle with gates, explicit apply, Web API write, local mirror replay, append-only journal, and reversible undo.</desc>
  <defs>
    <filter id="zd5-shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e2a44" flood-opacity="0.12"/>
    </filter>
    <marker id="zd5-arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent-text)"/>
    </marker>
    <marker id="zd5-arrow-muted" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--banner-mark)"/>
    </marker>
    <style>
      .zotio-diagram {
        --canvas: #fbfcfe;
        --surface: #ffffff;
        --border: #d7dee9;
        --border-dim: #cbd5e1;
        --text-strong: #1e2a44;
        --text-body: #33415c;
        --grey: #64748b;
        --read-bg: #e6f0fb;
        --read-line: #2c6cb0;
        --read-text: #173a5e;
        --write-bg: #fde2e2;
        --write-line: #c0392b;
        --write-text: #7a1f16;
        --ext-bg: #fdf3d8;
        --ext-line: #b8860b;
        --ext-text: #6b4e0a;
        --local-bg: #eef1f5;
        --replay: #0aa06e;
        --core: #4f46e5;
        --core-stroke: #312e81;
        --accent-text: #4f46e5;
        --banner-mark: #94a3b8;
        --border-2: #e2e8f0;
        --border-3: #d8e0ec;
        --border-4: #d8dee8;
        --green-bg: #d6f5e3;
        --green-bg-soft: #eefaf3;
        --green-text: #0a5f43;
        --indigo-text: #4338ca;
        --indigo-bg-line: #c7d2fe;
        --indigo-bg: #f2f4ff;
        --amber-text2: #8c6d1e;
      }
      @media (prefers-color-scheme: dark) {
        .zotio-diagram {
          --canvas: #12161f;
          --surface: #1b2230;
          --border: #2c3647;
          --border-dim: #3a4660;
          --text-strong: #eaeef6;
          --text-body: #c6cfdd;
          --grey: #8b98ac;
          --read-bg: #14273c;
          --read-line: #5b9bd5;
          --read-text: #cfe2f6;
          --write-bg: #3a1c1a;
          --write-line: #e07a6e;
          --write-text: #f6cec9;
          --ext-bg: #322b12;
          --ext-line: #d9ab35;
          --ext-text: #f0e0ad;
          --local-bg: #1d2431;
          --replay: #2ecb93;
          --core: #6366f1;
          --core-stroke: #4f46e5;
          --accent-text: #a5b4fc;
          --banner-mark: #8b98ac;
          --border-2: #2c3647;
          --border-3: #2c3647;
          --border-4: #2c3647;
          --green-bg: #16321f;
          --green-bg-soft: #14251b;
          --green-text: #a7e8c8;
          --indigo-text: #a5b4fc;
          --indigo-bg-line: #3a3f6e;
          --indigo-bg: #1c2030;
          --amber-text2: #e6c877;
        }
      }
.zotio-diagram .title { font: 700 22px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: var(--text-strong); }.zotio-diagram .subtitle { font: 13px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: var(--grey); }.zotio-diagram .node-title { font: 700 14px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }.zotio-diagram .label { font: 13px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: var(--text-body); }.zotio-diagram .small { font: 12px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: var(--grey); }.zotio-diagram .tiny { font: 11px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: var(--grey); }.zotio-diagram .mono { font: 600 11.5px ui-monospace, SFMono-Regular, Menlo, monospace; fill: var(--grey); }.zotio-diagram .mono-dark { font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: var(--text-body); }.zotio-diagram .flow { fill: none; stroke: var(--accent-text); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#zd5-arrow); }.zotio-diagram .muted-flow { fill: none; stroke: var(--banner-mark); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#zd5-arrow-muted); }.zotio-diagram .card { rx: 12; filter: url(#zd5-shadow); }.zotio-diagram .badge { rx: 9; }.zotio-diagram .legend-text { font: 11px ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; fill: var(--grey); }
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="680" fill="var(--canvas)"/>

  <text x="32" y="38" class="title">Safe by default: preview, gate, apply, journal, undo</text>
  <text x="32" y="60" class="subtitle">Every zotio write command starts as a reviewable plan; nothing mutates until explicit consent passes safety gates.</text>

  <g aria-label="legend">
    <rect x="420" y="646" width="12" height="12" rx="3" fill="var(--read-bg)" stroke="var(--read-line)"/>
    <text x="438" y="656" class="legend-text">preview / local</text>
    <rect x="528" y="646" width="12" height="12" rx="3" fill="var(--local-bg)" stroke="var(--grey)"/>
    <text x="546" y="656" class="legend-text">gates</text>
    <rect x="598" y="646" width="12" height="12" rx="3" fill="var(--write-bg)" stroke="var(--write-line)"/>
    <text x="616" y="656" class="legend-text">apply / Web API</text>
    <rect x="766" y="646" width="12" height="12" rx="3" fill="var(--green-bg)" stroke="var(--replay)"/>
    <text x="784" y="656" class="legend-text">journal / undo</text>
  </g>

  <!-- Main preview-first lifecycle -->
  <g id="zd5-command">
    <rect class="card" x="32" y="102" width="164" height="86" rx="12" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="1.8"/>
    <text x="52" y="129" class="node-title" fill="var(--text-body)">1. COMMAND</text>
    <text x="52" y="148" class="mono">tags audit fix</text>
    <text x="52" y="168" class="mono">items enrich</text>
    <text x="52" y="181" class="mono">--missing-doi</text>
  </g>

  <path class="flow" d="M196 145 H226"/>

  <g id="zd5-plan">
    <rect class="card" x="226" y="102" width="220" height="86" rx="12" fill="var(--read-bg)" stroke="var(--read-line)" stroke-width="1.8"/>
    <text x="248" y="129" class="node-title" fill="var(--read-text)">2. PLAN (preview)</text>
    <text x="248" y="149" class="label" fill="var(--read-text)">plan / result envelope</text>
    <text x="248" y="168" class="mono">default: preview only</text>
    <text x="248" y="181" class="tiny">NO changes yet</text>
  </g>

  <path class="flow" d="M446 145 H462"/>

  <g id="zd5-gates">
    <rect class="card" x="462" y="84" width="264" height="124" rx="12" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="1.8"/>
    <text x="484" y="111" class="node-title" fill="var(--text-body)">3. GATES</text>
    <rect x="484" y="124" width="116" height="22" rx="8" fill="var(--canvas)" stroke="var(--grey)" stroke-width="1"/>
    <text x="494" y="139" class="mono-dark">--max-changes</text>
    <text x="604" y="139" class="tiny">500 (50 under --agent)</text>
    <rect x="484" y="151" width="154" height="22" rx="8" fill="var(--canvas)" stroke="var(--grey)" stroke-width="1"/>
    <text x="494" y="166" class="mono-dark">--allow-destructive</text>
    <text x="642" y="166" class="tiny">irreversible ops</text>
    <rect x="484" y="178" width="128" height="22" rx="8" fill="var(--canvas)" stroke="var(--grey)" stroke-width="1"/>
    <text x="494" y="193" class="mono-dark">--require-fresh</text>
    <text x="624" y="193" class="small">fresh mirror</text>
  </g>

  <path class="flow" d="M726 145 H754"/>

  <g id="zd5-gate-refusal">
    <path class="muted-flow" d="M594 208 V226"/>
    <rect x="514" y="226" width="174" height="42" rx="10" fill="var(--write-bg)" stroke="var(--write-line)" stroke-width="1.6"/>
    <text x="537" y="251" class="node-title" fill="var(--write-text)">REFUSE loud</text>
    <text x="526" y="261" class="tiny" fill="var(--write-text)">failed gate = no write</text>
  </g>

  <g id="zd5-decision">
    <polygon points="830,90 906,145 830,200 754,145" fill="var(--canvas)" stroke="var(--accent-text)" stroke-width="2" filter="url(#zd5-shadow)"/>
    <text x="830" y="136" text-anchor="middle" class="node-title" fill="var(--text-strong)">4. Decision</text>
    <text x="830" y="154" text-anchor="middle" class="mono-dark" fill="var(--text-strong)">--yes provided?</text>
  </g>

  <g id="zd5-preview-stop">
    <path class="muted-flow" d="M830 200 V228"/>
    <rect x="754" y="228" width="152" height="62" rx="12" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="1.7"/>
    <text x="784" y="252" class="node-title" fill="var(--text-body)">No: STOP</text>
    <text x="771" y="272" class="small">preview is the</text>
    <text x="778" y="283" class="small">final output</text>
    <rect x="836" y="206" width="28" height="18" rx="6" fill="var(--canvas)" stroke="var(--banner-mark)" stroke-width="1"/>
    <text x="844" y="219" class="tiny">no</text>
  </g>

  <path class="flow" d="M792 172 C762 250 724 302 662 330"/>
  <rect x="712" y="244" width="32" height="20" rx="7" fill="var(--canvas)" stroke="var(--accent-text)" stroke-width="1"/>
  <text x="721" y="258" class="tiny" fill="var(--accent-text)">yes</text>

  <g id="zd5-apply">
    <rect class="card" x="516" y="330" width="190" height="76" rx="12" fill="var(--write-bg)" stroke="var(--write-line)" stroke-width="1.9"/>
    <text x="543" y="357" class="node-title" fill="var(--write-text)">5. APPLY</text>
    <text x="543" y="379" class="label" fill="var(--write-text)">explicit mutation</text>
    <text x="543" y="393" class="mono" fill="var(--write-text)">applies the change</text>
  </g>

  <!-- Callout chips -->
  <g id="zd5-chips">
    <rect x="32" y="228" width="246" height="34" rx="17" fill="none" stroke="var(--replay)" stroke-width="1" stroke-dasharray="3 2.5" stroke-opacity="0.8"/>
    <text x="50" y="250" class="mono-dark" fill="var(--green-text)"><tspan fill="var(--replay)">▸ </tspan>--agent does NOT auto-apply</text>
    <rect x="32" y="276" width="204" height="34" rx="17" fill="none" stroke="var(--ext-line)" stroke-width="1" stroke-dasharray="3 2.5" stroke-opacity="0.8"/>
    <text x="50" y="298" class="mono-dark" fill="var(--ext-text)"><tspan fill="var(--ext-line)">▸ </tspan>--dry-run always wins</text>
  </g>

  <!-- Apply side effects -->
  <path class="flow" d="M706 368 H805 V480"/>
  <path class="flow" d="M611 406 V448 H525 V480"/>
  <path class="flow" d="M516 368 H380 V525"/>

  <g id="zd5-web-api">
    <rect class="card" x="690" y="480" width="230" height="86" rx="12" fill="var(--write-bg)" stroke="var(--write-line)" stroke-width="1.8"/>
    <text x="713" y="508" class="node-title" fill="var(--write-text)">WRITE to Zotero Web API</text>
    <text x="713" y="531" class="small" fill="var(--write-text)">update / delete / enrich / tags</text>
    <text x="713" y="549" class="tiny">with configured api_key</text>
  </g>

  <g id="zd5-mirror">
    <rect class="card" x="420" y="480" width="210" height="86" rx="12" fill="var(--read-bg)" stroke="var(--read-line)" stroke-width="1.8"/>
    <text x="444" y="508" class="node-title" fill="var(--read-text)">REPLAY to local mirror</text>
    <text x="444" y="531" class="small" fill="var(--read-text)">read-your-writes</text>
    <text x="444" y="549" class="tiny">fresh re-audit without sync</text>
  </g>

  <g id="zd5-journal">
    <rect class="card" x="32" y="424" width="348" height="196" rx="12" fill="var(--green-bg)" stroke="var(--replay)" stroke-width="1.9"/>
    <text x="56" y="452" class="node-title" fill="var(--green-text)">6. RECORD append-only JOURNAL</text>
    <text x="56" y="474" class="mono-dark" fill="var(--green-text)">journal list</text>
    <text x="168" y="474" class="mono-dark" fill="var(--green-text)">journal show</text>
    <text x="56" y="494" class="mono-dark" fill="var(--green-text)">journal undo &lt;run-id&gt;</text>

    <rect x="56" y="512" width="142" height="84" rx="10" fill="var(--canvas)" stroke="var(--replay)" stroke-width="1.4"/>
    <text x="76" y="535" class="node-title" fill="var(--green-text)">UNDO reverses</text>
    <text x="76" y="557" class="small" fill="var(--green-text)">tag rename</text>
    <text x="76" y="575" class="small" fill="var(--green-text)">collection</text>
    <text x="76" y="590" class="small" fill="var(--green-text)">membership</text>

    <rect x="218" y="512" width="138" height="84" rx="10" fill="var(--write-bg)" stroke="var(--write-line)" stroke-width="1.4"/>
    <text x="234" y="535" class="node-title" fill="var(--write-text)">REFUSES rest</text>
    <text x="234" y="557" class="small" fill="var(--write-text)">merges, deletes</text>
    <text x="234" y="575" class="small" fill="var(--write-text)">field overwrites</text>
    <text x="234" y="590" class="tiny" fill="var(--write-text)">loud, not silent</text>
  </g>

  <g id="zd5-bottom-hook">
    <text x="428" y="626" class="label" fill="var(--text-strong)"><tspan fill="var(--banner-mark)">▸ </tspan>Hook: safe by default — preview, gate, apply, journal, undo.</text>
  </g>
</svg>
