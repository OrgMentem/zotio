<svg class="zotio-diagram" xmlns="http://www.w3.org/2000/svg" width="960" height="658" viewBox="0 0 960 658" role="img" aria-labelledby="zd1-title zd1-desc">
  <title id="zd1-title">zotio hybrid routing architecture</title>
  <desc id="zd1-desc">Hero diagram showing zotio routing reads locally without an API key, writes to Zotero Web API with a key, external metadata providers, local-only desktop commands, local version reads before writes, and replay into the SQLite mirror.</desc>
  <defs>
    <filter id="zd1-softShadow" x="-10%" y="-12%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1e2a44" flood-opacity="0.10"/>
    </filter>
    <marker id="zd1-arrowIndigo" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="var(--accent-text)"/>
    </marker>
    <marker id="zd1-arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="var(--read-line)"/>
    </marker>
    <marker id="zd1-arrowCoral" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="var(--write-line)"/>
    </marker>
    <marker id="zd1-arrowAmber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="var(--ext-line)"/>
    </marker>
    <marker id="zd1-arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="var(--replay)"/>
    </marker>
    <marker id="zd1-arrowGrey" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="var(--grey)"/>
    </marker>
    <style>
      .zotio-diagram {
        --canvas: #fbfcfe;
        --surface: #ffffff;
        --border: #d7dee9;
        --border-dim: #cbd5e1;
        --text-strong: #1e2a44;
        --text-body: #33415c;
        --grey: #64748b;
        --read-bg: #e6f0fb;
        --read-line: #2c6cb0;
        --read-text: #173a5e;
        --write-bg: #fde2e2;
        --write-line: #c0392b;
        --write-text: #7a1f16;
        --ext-bg: #fdf3d8;
        --ext-line: #b8860b;
        --ext-text: #6b4e0a;
        --local-bg: #eef1f5;
        --replay: #0aa06e;
        --core: #4f46e5;
        --core-stroke: #312e81;
        --accent-text: #4f46e5;
        --banner-mark: #94a3b8;
        --border-2: #e2e8f0;
        --border-3: #d8e0ec;
        --border-4: #d8dee8;
        --green-bg: #d6f5e3;
        --green-bg-soft: #eefaf3;
        --green-text: #0a5f43;
        --indigo-text: #4338ca;
        --indigo-bg-line: #c7d2fe;
        --indigo-bg: #f2f4ff;
        --amber-text2: #8c6d1e;
      }
      @media (prefers-color-scheme: dark) {
        .zotio-diagram {
          --canvas: #12161f;
          --surface: #1b2230;
          --border: #2c3647;
          --border-dim: #3a4660;
          --text-strong: #eaeef6;
          --text-body: #c6cfdd;
          --grey: #8b98ac;
          --read-bg: #14273c;
          --read-line: #5b9bd5;
          --read-text: #cfe2f6;
          --write-bg: #3a1c1a;
          --write-line: #e07a6e;
          --write-text: #f6cec9;
          --ext-bg: #322b12;
          --ext-line: #d9ab35;
          --ext-text: #f0e0ad;
          --local-bg: #1d2431;
          --replay: #2ecb93;
          --core: #6366f1;
          --core-stroke: #4f46e5;
          --accent-text: #a5b4fc;
          --banner-mark: #8b98ac;
          --border-2: #2c3647;
          --border-3: #2c3647;
          --border-4: #2c3647;
          --green-bg: #16321f;
          --green-bg-soft: #14251b;
          --green-text: #a7e8c8;
          --indigo-text: #a5b4fc;
          --indigo-bg-line: #3a3f6e;
          --indigo-bg: #1c2030;
          --amber-text2: #e6c877;
        }
      }
.zotio-diagram text { font-family: ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }.zotio-diagram .title { fill: var(--text-strong); font-size: 22px; font-weight: 700; }.zotio-diagram .subtitle { fill: var(--grey); font-size: 13px; }.zotio-diagram .node-title { font-size: 14px; font-weight: 700; }.zotio-diagram .node-subtitle { font-size: 12px; font-weight: 600; }.zotio-diagram .body { fill: var(--text-body); font-size: 12px; }.zotio-diagram .muted { fill: var(--grey); font-size: 12px; }.zotio-diagram .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }.zotio-diagram .legend { fill: var(--text-body); font-size: 11px; }.zotio-diagram .arrow-label { fill: var(--text-strong); font-size: 11px; font-weight: 700; }.zotio-diagram .small-label { fill: var(--grey); font-size: 10px; font-weight: 700; letter-spacing: .04em; }
    </style>
  </defs>

  <rect x="0" y="0" width="960" height="658" fill="var(--canvas)"/>

  <text id="zd1-hero-title" x="28" y="34" class="title">zotio hybrid routing</text>
  <text x="28" y="56" class="subtitle">Local-fast reads, key-gated cloud writes, and an immediately refreshed local mirror.</text>

  <g id="zd1-legend" transform="translate(586 23)">
    <rect x="0" y="0" width="360" height="54" rx="10" fill="var(--surface)" stroke="var(--border)" stroke-width="1.5"/>
    <rect x="14" y="13" width="12" height="12" rx="3" fill="var(--read-bg)" stroke="var(--read-line)" stroke-width="1.5"/>
    <text x="32" y="23" class="legend">READ</text>
    <rect x="86" y="13" width="12" height="12" rx="3" fill="var(--write-bg)" stroke="var(--write-line)" stroke-width="1.5"/>
    <text x="104" y="23" class="legend">WRITE</text>
    <rect x="166" y="13" width="12" height="12" rx="3" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="1.5"/>
    <text x="184" y="23" class="legend">EXTERNAL</text>
    <rect x="268" y="13" width="12" height="12" rx="3" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="1.5"/>
    <text x="286" y="23" class="legend">LOCAL-only</text>
    <text x="14" y="43" class="legend" fill="var(--grey)">Semantic colors are shared across README diagrams.</text>
  </g>

  <g id="zd1-body" transform="translate(0,-22)">

  <g id="zd1-read-plane">
    <rect x="38" y="132" width="310" height="314" rx="14" fill="var(--read-bg)" stroke="var(--read-line)" stroke-width="2" filter="url(#zd1-softShadow)"/>
    <text x="62" y="162" class="node-title" fill="var(--read-text)">READ plane</text>
    <text x="62" y="181" class="node-subtitle" fill="var(--read-text)">Local-first</text>

    <rect x="62" y="202" width="262" height="110" rx="10" fill="var(--surface)" stroke="var(--read-line)" stroke-width="1.5"/>
    <text x="78" y="226" class="node-title" fill="var(--read-text)">Local Zotero API :23119</text>
    <text x="78" y="244" class="muted">Zotero desktop running</text>
    <text x="78" y="267" class="mono" fill="var(--read-text)">items list/get</text>
    <text x="200" y="267" class="mono" fill="var(--read-text)">collections</text>
    <text x="78" y="290" class="mono" fill="var(--read-text)">annotations</text>
    <text x="200" y="290" class="mono" fill="var(--read-text)">fulltext</text>

    <rect x="62" y="326" width="262" height="96" rx="10" fill="var(--surface)" stroke="var(--read-line)" stroke-width="1.5"/>
    <text x="78" y="350" class="node-title" fill="var(--read-text)">Local SQLite mirror</text>
    <text x="78" y="368" class="muted">Synced cache for compound reads</text>
    <text x="78" y="391" class="mono" fill="var(--read-text)">search</text>
    <text x="146" y="391" class="mono" fill="var(--read-text)">items audit</text>
    <text x="245" y="391" class="mono" fill="var(--read-text)">stats</text>
  </g>

  <g id="zd1-create-connector">
    <rect x="612" y="132" width="310" height="128" rx="14" fill="var(--write-bg)" stroke="var(--write-line)" stroke-width="2" filter="url(#zd1-softShadow)"/>
    <text x="636" y="162" class="node-title" fill="var(--write-text)">Desktop connector</text>
    <text x="636" y="181" class="node-subtitle" fill="var(--write-text)">New-item create path</text>
    <rect x="636" y="196" width="262" height="52" rx="10" fill="var(--surface)" stroke="var(--write-line)" stroke-width="1.5"/>
    <text x="652" y="217" class="mono" fill="var(--write-text)">create items · attachments · PDFs</text>
    <text x="652" y="238" class="muted">prefers local · else Web API</text>
  </g>

  <g id="zd1-key-banner">
    <rect x="612" y="280" width="310" height="30" rx="8" fill="none" stroke="var(--border-dim)" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="767" y="300" text-anchor="middle" font-size="12" font-weight="600"><tspan fill="var(--banner-mark)" font-weight="700">▸</tspan><tspan fill="var(--accent-text)" dx="4">local reads/creates need no key · cloud writes do</tspan></text>
  </g>

  <g id="zd1-write-plane">
    <rect x="612" y="330" width="310" height="304" rx="14" fill="var(--write-bg)" stroke="var(--write-line)" stroke-width="2" filter="url(#zd1-softShadow)"/>
    <text x="636" y="360" class="node-title" fill="var(--write-text)">CLOUD write path</text>
    <text x="636" y="379" class="node-subtitle" fill="var(--write-text)">Zotero Web API</text>

    <rect x="636" y="396" width="262" height="218" rx="10" fill="var(--surface)" stroke="var(--write-line)" stroke-width="1.5"/>
    <text x="652" y="420" class="node-title" fill="var(--write-text)">api.zotero.org</text>
    <text x="652" y="438" class="muted">Auto-routed mutation target</text>
    <text x="652" y="472" class="mono" fill="var(--write-text)">items update/delete/move</text>
    <text x="652" y="506" class="mono" fill="var(--write-text)">enrich · tags audit fix</text>
    <text x="652" y="540" class="mono" fill="var(--write-text)">collections create/update</text>
    <text x="652" y="574" class="mono" fill="var(--write-text)">vault push · journal undo</text>
  </g>

  <g id="zd1-local-only-plane">
    <rect x="38" y="492" width="310" height="142" rx="14" fill="var(--local-bg)" stroke="var(--grey)" stroke-width="2" filter="url(#zd1-softShadow)"/>
    <text x="62" y="522" class="node-title" fill="var(--text-body)">LOCAL-only plane</text>
    <text x="62" y="541" class="node-subtitle" fill="var(--text-body)">Files · desktop · introspection</text>
    <rect x="62" y="558" width="262" height="58" rx="10" fill="var(--surface)" stroke="var(--grey)" stroke-width="1.5"/>
    <text x="78" y="583" class="mono" fill="var(--text-body)">vault sync</text>
    <text x="170" y="583" class="mono" fill="var(--text-body)">items open</text>
    <text x="264" y="583" class="mono" fill="var(--text-body)">doctor</text>
    <text x="78" y="604" class="mono" fill="var(--text-body)">capabilities</text>
  </g>

  <g id="zd1-external-plane">
    <rect x="356" y="486" width="248" height="148" rx="14" fill="var(--ext-bg)" stroke="var(--ext-line)" stroke-width="2" filter="url(#zd1-softShadow)"/>
    <text x="380" y="516" class="node-title" fill="var(--ext-text)">EXTERNAL plane</text>
    <text x="380" y="534" class="node-subtitle" fill="var(--ext-text)">Metadata providers</text>
    <rect x="372" y="550" width="216" height="74" rx="10" fill="var(--surface)" stroke="var(--ext-line)" stroke-width="1.5"/>
    <text x="388" y="573" class="mono" fill="var(--ext-text)">CrossRef · OpenAlex</text>
    <text x="388" y="592" class="mono" fill="var(--ext-text)">Semantic Scholar</text>
    <text x="388" y="611" class="mono" fill="var(--ext-text)">Unpaywall · OpenCitations</text>
  </g>

  <g id="zd1-zotio-core">
    <rect x="400" y="278" width="160" height="104" rx="18" fill="var(--core)" stroke="var(--core-stroke)" stroke-width="2" filter="url(#zd1-softShadow)"/>
    <text x="480" y="319" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="800">zotio</text>
    <text x="480" y="344" text-anchor="middle" fill="#eef2ff" font-size="12" font-weight="700">routing + safety layer</text>
    <text x="480" y="363" text-anchor="middle" fill="#eef2ff" font-size="11">one CLI surface</text>
  </g>

  <g id="zd1-flows" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g id="zd1-flow-lines">
      <path d="M400 306 C382 302 366 300 348 300" stroke="var(--read-line)" stroke-width="3" marker-end="url(#zd1-arrowBlue)"/>
      <path d="M534 278 C572 250 590 224 612 208" stroke="var(--write-line)" stroke-width="2.5" marker-end="url(#zd1-arrowCoral)"/>
      <path d="M560 350 C584 356 598 366 612 372" stroke="var(--write-line)" stroke-width="3" marker-end="url(#zd1-arrowCoral)"/>
      <path d="M612 442 C520 480 432 466 348 402" stroke="var(--replay)" stroke-width="3" marker-end="url(#zd1-arrowGreen)"/>
      <path d="M475 486 L475 382" stroke="var(--ext-line)" stroke-width="2.5" marker-end="url(#zd1-arrowAmber)"/>
      <path d="M436 382 C400 420 330 456 262 492" stroke="var(--grey)" stroke-width="2.5" marker-end="url(#zd1-arrowGrey)" opacity="0.9"/>
    </g>

    <g id="zd1-flow-labels">
      <rect x="352" y="272" width="44" height="20" rx="8" fill="var(--canvas)" stroke="var(--border)" stroke-width="1"/>
      <text x="374" y="286" text-anchor="middle" class="arrow-label">reads</text>

      <rect x="500" y="216" width="66" height="20" rx="8" fill="var(--canvas)" stroke="var(--border)" stroke-width="1"/>
      <text x="533" y="230" text-anchor="middle" class="arrow-label">new items</text>

      <rect x="564" y="322" width="44" height="20" rx="8" fill="var(--canvas)" stroke="var(--border)" stroke-width="1"/>
      <text x="586" y="336" text-anchor="middle" class="arrow-label">writes</text>

      <rect x="486" y="420" width="108" height="20" rx="8" fill="var(--canvas)" stroke="var(--border)" stroke-width="1"/>
      <text x="540" y="434" text-anchor="middle" class="arrow-label">replay → mirror</text>

      <rect x="488" y="392" width="88" height="20" rx="8" fill="var(--canvas)" stroke="var(--border)" stroke-width="1"/>
      <text x="532" y="406" text-anchor="middle" class="arrow-label">enrich · import</text>

      <rect x="210" y="454" width="64" height="20" rx="8" fill="var(--canvas)" stroke="var(--border)" stroke-width="1"/>
      <text x="242" y="468" text-anchor="middle" class="arrow-label">local ops</text>
    </g>
  </g>
  </g>
</svg>
