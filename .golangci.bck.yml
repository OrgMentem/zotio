linters:
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gofmt
    - goimports
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  gosec:
    excludes:
      # web_api_key is a config-key *name*, not a credential value (false positive).
      - G101
