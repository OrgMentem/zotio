name: docs

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "cmd/docs-gen/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
  schedule:
    # Weekly badge refresh — the live bibliography badge is built into the
    # Pages artifact and would otherwise go stale between docs changes.
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"
      - name: Install Zensical
        run: pip install -r docs/requirements.txt
      - name: Build site
        run: zensical build
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
      - name: Generate live bibliography badge
        env:
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ZOTERO_API_KEY}" ]; then
            echo "ZOTERO_API_KEY not set; skipping badge generation" >&2
            exit 0
          fi
          user_id="$(curl -fsSL -H "Zotero-API-Key: ${ZOTERO_API_KEY}" https://api.zotero.org/keys/current | python3 -c 'import json,sys; print(json.load(sys.stdin)["userID"])')"
          export ZOTERO_BASE_URL="https://api.zotero.org/users/${user_id}"
          go run ./cmd/zotio sync
          # quick preset, no --fail-on: the badge reports findings but a docs
          # deploy never fails on library state.
          go run ./cmd/zotio library health --for quick --badge > site/bibliography-badge.json
          cat site/bibliography-badge.json
      - name: Generate agent docs (llms.txt, llms-full.txt)
        run: |
          go run ./cmd/docs-gen -llms-out site
          head -12 site/llms.txt
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
