# CI-recorded, cosign-signed releases.
name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.x'
      # Release gate: nothing enforces that the tagged commit passed CI (tags
      # are pushed manually), so refuse to ship artifacts from untested code.
      - name: Test
        run: go test ./...
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      # Fail the release if the built binaries don't report the tag version —
      # catches a dropped/renamed -X ldflag before artifacts ship. Snapshot
      # single-target build is cheap and runs before the real release build
      # (its snapshot version embeds the base tag, so the greps below hold).
      - name: Build snapshot for version smoke test
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          args: build --snapshot --clean --single-target
      - name: Smoke-test version stamp
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          zotio_bin="$(find dist -type f -name zotio -path '*linux*')"
          mcp_bin="$(find dist -type f -name zotio-mcp -path '*linux*')"
          "$zotio_bin" version | tee /dev/stderr | grep -F "$tag"
          "$mcp_bin" --version | tee /dev/stderr | grep -F "$tag"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
      # The Homebrew formula was migrated to a cask (Casks/zotio.rb, since
      # 82189ca). GoReleaser publishes the cask but cannot delete the superseded
      # Formula/zotio.rb, so `brew install orgmentem/tap/zotio` would keep
      # resolving the frozen formula and ignore the cask. Remove it once the
      # cask is published. Idempotent: a no-op after the first cask release.
      - name: Drop stale Homebrew formula (superseded by cask)
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha="$(gh api repos/OrgMentem/homebrew-tap/contents/Formula/zotio.rb --jq .sha 2>/dev/null || true)"
          if [ -n "$sha" ]; then
            gh api -X DELETE repos/OrgMentem/homebrew-tap/contents/Formula/zotio.rb \
              -f message="zotio: drop formula superseded by cask" \
              -f sha="$sha"
            echo "Deleted stale Formula/zotio.rb ($sha)"
          else
            echo "No stale formula to remove."
          fi

  publish_registry:
    name: Publish to Official MCP Registry
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Download the release assets rather than passing unverified build output
      # between jobs. This also makes "Re-run failed jobs" a safe recovery
      # boundary when GitHub publication succeeds but registry publication fails.
      - name: Download published MCPB assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist/mcpb
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern '*.mcpb' \
            --dir dist/mcpb
      # Auth is OIDC (no stored token): this workflow's identity proves control
      # of OrgMentem/zotio and therefore the io.github.OrgMentem/* namespace.
      - name: Publish to MCP Registry
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          publisher_version="1.7.9"
          publisher_sha256="ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac"
          publisher_archive="${RUNNER_TEMP}/mcp-publisher_linux_amd64.tar.gz"
          publisher_dir="${RUNNER_TEMP}/mcp-publisher-${publisher_version}"

          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/download/v${publisher_version}/mcp-publisher_linux_amd64.tar.gz" \
            -o "$publisher_archive"
          printf '%s  %s\n' "$publisher_sha256" "$publisher_archive" | sha256sum -c -
          mkdir -p "$publisher_dir"
          tar -xzf "$publisher_archive" -C "$publisher_dir" mcp-publisher

          python3 scripts/gen_server_json.py "$version"
          "$publisher_dir/mcp-publisher" login github-oidc
          "$publisher_dir/mcp-publisher" publish server.json
