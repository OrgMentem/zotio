version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - gosec
  settings:
    gosec:
      excludes:
        # web_api_key is a config-key *name*, not a credential value (false positive).
        - G101
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # ST1005: this tool's errors routinely start with proper nouns ("Zotero",
      # "Open Library"), the documented exception to the lowercase-error rule.
      - linters:
          - staticcheck
        text: 'ST1005:'
      # gosec targets the production security surface; test files legitimately
      # write 0644 temp fixtures and mock taint-y HTTP responses (G306/G705
      # false positives), so scope gosec out of tests.
      - linters:
          - gosec
        path: '_test\.go'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
