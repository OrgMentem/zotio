# Documentation site config. Consumed natively by Zensical (`zensical build`)
# and, unchanged, by Material for MkDocs (`mkdocs build`) as a fallback while
# Zensical (currently 0.0.x, pre-1.0) matures toward full parity.
#
# Source Markdown lives in docs/. Pages under docs/reference/ are CODE-GENERATED
# by `cmd/docs-gen` (run `make docs-gen`) and drift-gated in CI — never hand-edit
# them. Everything else in docs/ is authored by hand.

site_name: zotio
site_description: The trust-and-automation layer for Zotero — search, export, analytics, and safe writes in the terminal.
site_author: OrgMentem
copyright: Copyright &copy; 2026 OrgMentem — MIT. Zotero is a registered trademark of the Corporation for Digital Scholarship; zotio is an independent project, not affiliated with or endorsed by Zotero.
# Canonical URL (required for the sitemap that instant navigation relies on) + repo links.
site_url: https://orgmentem.github.io/zotio/
repo_url: https://github.com/OrgMentem/zotio
repo_name: OrgMentem/zotio
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo-mono.svg
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share

extra_css:
  - stylesheets/diagrams.css

extra:
  # Suppress the "Made with Zensical/Material for MkDocs" footer notice.
  # License-clean (not an attribution requirement); honored by Material,
  # and by Zensical where wired (pre-1.0 — verify on deploy).
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Guide:
      - Install: guide/install.md
      - Authentication: guide/authentication.md
      - Obsidian / Logseq vault: guide/vault.md
      - CI for your bibliography: guide/ci.md
      - Use in a coding agent: guide/agent-skill.md
      - MCP server: guide/mcp-server.md
  - Concepts:
      - Zotero API behavior: concepts/zotero-api.md
      - Safe-by-default writes: concepts/write-safety.md
      - Local read parity: concepts/local-read-parity.md
  - Reference:
      - Commands: reference/commands.md
      - Highlights: reference/highlights.md
      - Capabilities & trust model: reference/capabilities.md
      - MCP tools: reference/mcp-tools.md
  - Contributing:
      - Architecture decisions: contributing/architecture-decisions.md
