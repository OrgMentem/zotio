version: 2
project_name: zotio
changelog:
  disable: true
builds:
  - id: zotio
    main: ./cmd/zotio
    binary: zotio
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X zotio/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: zotio-mcp
    main: ./cmd/zotio-mcp
    binary: zotio-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
# PATCH(glean zotio-9131682f): Generate Syft SBOMs for released archives.
sboms:
  - artifacts: archive
# PATCH(glean zotio-9131682f): Sign release checksums with cosign keyless OIDC.
signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --output-signature
      - "${signature}"
      - --output-certificate
      - "${certificate}"
      - "${artifact}"
    artifacts: checksum
    env:
      - COSIGN_EXPERIMENTAL=1
brews:
  - name: zotio
    repository:
      owner: OrgMentem
      name: homebrew-tap
      # PATCH(marketing-heroes-2): the default GITHUB_TOKEN cannot push
      # cross-repo; this fine-grained PAT has contents:write on
      # homebrew-tap only.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_msg_template: "zotio {{ .Tag }}"
    homepage: "https://github.com/OrgMentem/zotio"
    description: "Zotero automation CLI: local-first search, library health checks, preview-first writes, annotation export, and MCP"
    install: |
      bin.install "zotio"
      bin.install "zotio-mcp"
