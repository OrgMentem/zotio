version: 2
project_name: zotio
# Group conventional-commit release notes; raw commit lists read as noise on
# release pages.
changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^style"
      - "^test"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 2
    - title: Build & CI
      regexp: '^.*?(ci|chore|brand)(\(.+\))??!?:.+$'
      order: 3
    - title: Other
      order: 999
release:
  footer: |
    ---
    **Curated history:** [CHANGELOG.md](https://github.com/OrgMentem/zotio/blob/main/CHANGELOG.md) · **Install:** `brew install orgmentem/tap/zotio`
  extra_files:
    # Per-platform MCPB bundles for Claude Desktop, packed by
    # scripts/mcpb_pack.py as a zotio-mcp post-build hook.
    - glob: dist/mcpb/*.mcpb
builds:
  - id: zotio
    main: ./cmd/zotio
    binary: zotio
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X zotio/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: zotio-mcp
    main: ./cmd/zotio-mcp
    binary: zotio-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
    hooks:
      post:
        - cmd: python3 scripts/mcpb_pack.py "{{ .Path }}" {{ .Os }} {{ .Arch }} {{ .Version }}
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
# Generate Syft SBOMs for released archives.
sboms:
  - artifacts: archive
# Sign release checksums with cosign keyless OIDC. Cosign v3 (installed by
# cosign-installer v4) requires bundle output for sign-blob: one
# .sigstore.json replaces the old .sig/.pem pair.
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --yes
      - --bundle
      - "${signature}"
      - "${artifact}"
    artifacts: checksum
brews:
  - name: zotio
    repository:
      owner: OrgMentem
      name: homebrew-tap
      # The default GITHUB_TOKEN cannot push cross-repo; this fine-grained PAT
      # has contents:write on homebrew-tap only.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_msg_template: "zotio {{ .Tag }}"
    # goreleaser writes to the tap root unless told otherwise; brew expects Formula/.
    directory: Formula
    homepage: "https://github.com/OrgMentem/zotio"
    description: "Zotero automation CLI: local-first search, library health checks, preview-first writes, annotation export, and MCP"
    install: |
      bin.install "zotio"
      bin.install "zotio-mcp"
# Windows: self-owned Scoop bucket (mirrors the homebrew-tap pattern). Packages
# the windows zip archives, which already contain both zotio and zotio-mcp.
scoops:
  - repository:
      owner: OrgMentem
      name: scoop-bucket
      # Same cross-repo constraint as the tap: default GITHUB_TOKEN can't push
      # to another repo. Fine-grained PAT with contents:write on scoop-bucket.
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    directory: bucket
    commit_msg_template: "zotio {{ .Tag }}"
    homepage: "https://github.com/OrgMentem/zotio"
    description: "Zotero automation CLI: local-first search, library health checks, preview-first writes, annotation export, and MCP"
    license: MIT
# Windows: WinGet manifests, PR'd from a fork into microsoft/winget-pkgs.
winget:
  - name: zotio
    publisher: OrgMentem
    license: MIT
    homepage: "https://github.com/OrgMentem/zotio"
    short_description: "Zotero automation CLI: library health, preview-first writes, annotation export, MCP"
    repository:
      owner: OrgMentem
      # A fork of microsoft/winget-pkgs; goreleaser commits here, then opens a PR upstream.
      name: winget-pkgs
      branch: "zotio-{{ .Version }}"
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
# Linux distro packages attached to each GitHub release (both binaries in one package).
nfpms:
  - id: zotio
    package_name: zotio
    ids:
      - zotio
      - zotio-mcp
    formats:
      - deb
      - rpm
      - apk
    maintainer: "OrgMentem <zotio@orgmentem.com>"
    homepage: "https://github.com/OrgMentem/zotio"
    description: "Zotero automation CLI: local-first search, library health checks, preview-first writes, annotation export, and MCP"
    license: MIT
    bindir: /usr/bin
