version: 2
project_name: zotero-pp-cli
changelog:
  disable: true
builds:
  - id: zotero-pp-cli
    main: ./cmd/zotero-pp-cli
    binary: zotero-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X zotero-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: zotero-pp-mcp
    main: ./cmd/zotero-pp-mcp
    binary: zotero-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: zotero-pp-cli
    repository:
      owner: enieuwy
      name: homebrew-tap
    homepage: "https://github.com/enieuwy/zotero-pp-cli"
    description: "Every Zotero feature in the terminal, plus offline search, annotation export, and library analytics no existing tool..."
    install: |
      bin.install "zotero-pp-cli"
      bin.install "zotero-pp-mcp"
