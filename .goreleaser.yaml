version: 2
project_name: zotio
changelog:
  disable: true
builds:
  - id: zotio
    main: ./cmd/zotio
    binary: zotio
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X zotio/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: zotio-mcp
    main: ./cmd/zotio-mcp
    binary: zotio-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: zotio
    repository:
      owner: enieuwy
      name: homebrew-tap
    homepage: "https://github.com/enieuwy/zotio"
    description: "Every Zotero feature in the terminal, plus offline search, annotation export, and library analytics no existing tool..."
    install: |
      bin.install "zotio"
      bin.install "zotio-mcp"
